<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glassmorphism Login Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <div class="bg-overlay"></div>
      <section class="login-card" aria-label="Login form">
        <header class="login-header">
          <p class="tag">Welcome back</p>
          <h1>LOGIN</h1>
          <p class="subtitle">Sign in to continue your journey</p>
        </header>

        <form id="loginForm" class="login-form" novalidate>
          <div class="input-group">
            <label for="email">Email</label>
            <div class="input-wrap">
              <span class="icon" aria-hidden="true">✉</span>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="you@example.com"
                required
              />
            </div>
            <small class="error" id="emailError"></small>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="icon" aria-hidden="true">🔒</span>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Enter password"
                minlength="6"
                required
              />
              <button
                class="toggle-pass"
                type="button"
                id="togglePassword"
                aria-label="Show password"
              >
                Show
              </button>
            </div>
            <small class="error" id="passwordError"></small>
          </div>

          <div class="row">
            <label class="remember-me" for="remember">
              <input id="remember" type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button class="btn-login" id="submitBtn" type="submit">SIGN IN</button>
          <p class="status-msg" id="statusMsg" aria-live="polite"></p>
        </form>

        <footer class="login-footer">
          <p>New here? <a href="#">Create account</a></p>
        </footer>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
